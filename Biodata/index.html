<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Interaktif - Rizky Pratama</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --secondary: #D2691E;
            --accent: #F4E4BC;
            --text: #2C1810;
            --bg: #FDF6E3;
            --white: #FFFFFF;
        }

        [data-theme="dark"] {
            --primary: #DAA520;
            --secondary: #B8860B;
            --accent: #4A2C0B;
            --text: #F5DEB3;
            --bg: #1A0F06;
            --white: #2C1810;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* Particle Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--secondary);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 80px 0;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--accent);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 20px 60px rgba(139,69,19,0.4); }
            100% { box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        }

        .typing-text {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 40px;
            background: var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text);
            opacity: 0.8;
        }

        /* Sections */
        .section {
            background: rgba(255,255,255,0.9);
            margin: 40px 0;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
        }

        .section h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }

        /* Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .info-card {
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--white), var(--accent));
            border-left: 5px solid var(--secondary);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .info-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .info-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .info-card h3 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Skills */
        .skill-item {
            margin-bottom: 25px;
        }

        .skill-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .skill-bar {
            height: 10px;
            background: var(--accent);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 5px;
            width: 0%;
            transition: width 2s ease;
        }

        /* Download Button */
        .download-btn {
            display: block;
            width: 250px;
            margin: 30px auto;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(139,69,19,0.3);
        }

        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139,69,19,0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .typing-text { font-size: 2rem; }
            .section { padding: 25px; margin: 20px 0; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
            
            <div class="profile-img">
                <i class="fas fa-user-graduate"></i>
            </div>
            
            <h1 class="typing-text" id="typingText"></h1>
            <span class="cursor" id="cursor"></span>
            <p class="subtitle">Mahasiswa Teknik Informatika<br><span id="currentYear"></span> | IPK 3.85</p>
        </header>

        <!-- Personal Info -->
        <section class="section">
            <h2><i class="fas fa-user"></i> Informasi Pribadi</h2>
            <div class="info-grid">
                <div class="info-card" data-aos="fade-up">
                    <div class="info-icon"><i class="fas fa-calendar-day"></i></div>
                    <h3>Tanggal Lahir</h3>
                    <p>15 Mei 2003 (21 tahun)</p>
                </div>
                <div class="info-card" data-aos="fade-up" data-aos-delay="100">
                    <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <h3>Alamat</h3>
                    <p>Jl. Sudirman No. 123<br>Jakarta Pusat</p>
                </div>
                <div class="info-card" data-aos="fade-up" data-aos-delay="200">
                    <div class="info-icon"><i class="fas fa-phone"></i></div>
                    <h3>Kontak</h3>
                    <p>+62 812-3456-7890<br>rizky@email.com</p>
                </div>
            </div>
        </section>

        <!-- Skills -->
        <section class="section">
            <h2><i class="fas fa-chart-line"></i> Keterampilan</h2>
            <div class="skill-item">
                <div class="skill-name">
                    <span>HTML & CSS</span>
                    <span>95%</span>
                </div>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="95"></div>
                </div>
            </div>
            <div class="skill-item">
                <div class="skill-name">
                    <span>JavaScript</span>
                    <span>85%</span>
                </div>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="85"></div>
                </div>
            </div>
            <div class="skill-item">
                <div class="skill-name">
                    <span>React JS</span>
                    <span>80%</span>
                </div>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="80"></div>
                </div>
            </div>
            <div class="skill-item">
                <div class="skill-name">
                    <span>Python</span>
                    <span>75%</span>
                </div>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="75"></div>
                </div>
            </div>
        </section>

        <!-- Download -->
        <div class="section" style="text-align: center;">
            <a href="#" class="download-btn" id="downloadBtn" download="biodata-rizky.pdf">
                <i class="fas fa-download"></i> Download CV
            </a>
        </div>
    </div>

    <script>
        // Typing Animation
        const text = "Rizky Pratama";
        const typingText = document.getElementById('typingText');
        const cursor = document.getElementById('cursor');
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                typingText.textContent += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            } else {
                cursor.style.display = 'none';
            }
        }

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        themeToggle.addEventListener('click', () => {
            body.dataset.theme = body.dataset.theme === 'dark' ? '' : 'dark';
            const icon = themeToggle.querySelector('i');
            icon.className = body.dataset.theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', body.dataset.theme);
        });

        // Load Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.dataset.theme = 'dark';
            themeToggle.querySelector('i').className = 'fas fa-sun';
        }

        // Particles
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particles.appendChild(particle);
            }
        }

        // Skill Progress Bars
        function animateSkills() {
            const progresses = document.querySelectorAll('.skill-progress');
            progresses.forEach(progress => {
                const width = progress.getAttribute('data-width');
                setTimeout(() => {
                    progress.style.width = width + '%';
                }, 500);
            });
        }

        // Current Year
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Download PDF (Simulasi)
        document.getElementById('downloadBtn').addEventListener('click', (e) => {
            e.preventDefault();
            alert('📥 CV berhasil diunduh!\n(Namanya: biodata-rizky.pdf)');
            // Di production: window.print() atau html2pdf library
        });

        // Init
        window.addEventListener('load', () => {
            typeWriter();
            createParticles();
            setTimeout(animateSkills, 1000);
        });

        // Smooth Scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
